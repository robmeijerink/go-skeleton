name: Go Tests (CI)

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v -cover -race ./...
